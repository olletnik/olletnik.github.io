name: Deploy from website repo

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: olletnik/website
          ref: main
          path: src

      - name: Build static output
        run: |
          mkdir -p out
          cp -r src/website4/* out/
          mkdir -p out/Referenzen
          cp -r src/Referenzen/* out/Referenzen/
          sed -i 's#\.\./Referenzen/#Referenzen/#g' out/index.html
          sed -i '/cdn-cgi\\/l\\/email-protection/d' out/index.html
          sed -i '/__cf_email__/d' out/index.html
          sed -i '/cloudflare-static\\/email-decode\\.min\\.js/d' out/index.html
          touch out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
